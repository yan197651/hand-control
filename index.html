<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture-control blinds</title>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --blind-height: 100%;
            --blind-rotate: 0deg;
        }

        body {
            background-color: #f0f2f5;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* 窗框设计 */
        .window-container {
            position: relative;
            width: 400px;
            height: 550px;
            background: #fff;
            border: 12px solid #333;
            border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            background-image: linear-gradient(to bottom, #87CEEB, #E0F7FA);
        }

        /* 窗外风景 */
        .scenery {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 100px;
            background: #a5d6a7;
            border-radius: 50% 50% 0 0;
            filter: blur(2px);
        }

        /* 百叶窗容器 */
        .blinds-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--blind-height);
            display: flex;
            flex-direction: column;
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* 单个叶片 */
        .blind-slat {
            flex: 1;
            width: 100%;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            box-sizing: border-box;
            transform-origin: center;
            transform: rotateX(var(--blind-rotate));
            transition: transform 0.8s ease;
        }

        /* 摄像头画面预览及提示容器 */
        #video-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 50;
        }

        .video-wrapper {
            width: 180px;
            height: 135px;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: #000;
        }

        #input_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* 操作提示文字样式 */
        .gesture-instructions {
            font-size: 10px;
            color: #4b5563;
            line-height: 1.4;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 8px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
            width: fit-content;
        }

        /* 状态指示器 */
        .status-badge {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 30px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            font-weight: 600;
            color: #1f2937;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
        }

        .dot.active {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        /* 密码提示框样式 */
        #password-alert {
            position: fixed;
            top: 20px;
            left: 20px;
            max-width: 300px;
            padding: 15px 20px;
            background: #ffffff;
            border-left: 5px solid #3b82f6;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1000;
            display: none;
            animation: slideIn 0.5s ease-out;
            font-size: 14px;
            line-height: 1.5;
            color: #1f2937;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- 密码提示框 -->
    <div id="password-alert">
        Please return to the questionnaire and continue answering the remaining questions. Your password is <strong>496542</strong>.
    </div>

    <div class="status-badge">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">Initializing camera…</span>
    </div>

    <div class="window-container">
        <div class="scenery"></div>
        <div class="scenery" style="left: 150px; height: 120px; background: #81c784;"></div>

        <div id="blinds" class="blinds-wrapper">
            <!-- 由脚本生成 25 个叶片 -->
        </div>
    </div>

    <!-- 摄像头实时预览及提示内容 -->
    <div id="video-container">
        <div class="video-wrapper">
            <video id="input_video" playsinline></video>
        </div>
        <div class="gesture-instructions">
            To raise the blind: Open your palm with your fingers fully extended. 🖐️<br>
            To lower the blind: Close your hand into a fist. ✊
        </div>
    </div>

    <script>
        const blindsContainer = document.getElementById('blinds');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const videoElement = document.getElementById('input_video');
        const passwordAlert = document.getElementById('password-alert');

        const SLAT_COUNT = 25;
        for (let i = 0; i < SLAT_COUNT; i++) {
            const slat = document.createElement('div');
            slat.className = 'blind-slat';
            blindsContainer.appendChild(slat);
        }

        let isOpened = false;
        let hasInteracted = false; 
        let timerStarted = false; // 用于记录是否已经开始倒计时

        function setBlindsState(open) {
            if (isOpened === open) return;
            
            hasInteracted = true;
            
            isOpened = open;
            if (isOpened) {
                document.documentElement.style.setProperty('--blind-height', '10%');
                document.documentElement.style.setProperty('--blind-rotate', '85deg');
                statusText.innerText = "Blinds Opened";
            } else {
                document.documentElement.style.setProperty('--blind-height', '100%');
                document.documentElement.style.setProperty('--blind-rotate', '0deg');
                statusText.innerText = "Blinds Closed";
            }
        }

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        // 启动20秒逻辑的函数
        function startFinalCountdown() {
            if (timerStarted) return;
            timerStarted = true;
            console.log("20s countdown started from first hand detection.");
            
            setTimeout(() => {
                if (hasInteracted) {
                    passwordAlert.style.display = 'block';
                }
            }, 20000); // 修改为 20000 毫秒（20秒）
        }

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // 只要变绿灯（识别到手掌），就开始倒计时
                statusDot.classList.add('active');
                startFinalCountdown();

                const hand = results.multiHandLandmarks[0];
                const wrist = hand[0];
                const thumbTip = hand[4];
                const pinkyTip = hand[20];
                const tips = [hand[8], hand[12], hand[16], hand[20]];
                
                let totalDist = 0;
                tips.forEach(tip => {
                    totalDist += getDistance(tip, wrist);
                });
                const avgDist = totalDist / tips.length;

                const palmWidth = Math.abs(thumbTip.x - pinkyTip.x);
                const isPalmFacing = palmWidth > 0.2;

                if (avgDist > 0.4 && isPalmFacing) {
                    setBlindsState(true);
                } else if (avgDist < 0.25) {
                    setBlindsState(false);
                }
            } else {
                statusDot.classList.remove('active');
                if (statusText.innerText !== "Blinds Opened" && statusText.innerText !== "Blinds Closed") {
                    statusText.innerText = "Please place your hand within the camera frame.";
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop());

                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({image: videoElement});
                    },
                    width: 640,
                    height: 480
                });

                await camera.start();
                statusText.innerText = "System Loading.";
            } catch (err) {
                console.error("Camera access error:", err);
                if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    statusText.innerText = "Camera in use by another app. Please close it and refresh.";
                } else {
                    statusText.innerText = "Unable to access the camera. Please check your permissions.";
                }
            }
        }

        window.onload = () => {
            setTimeout(startCamera, 1000);
        };
    </script>
</body>
</html>
